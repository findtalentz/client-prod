[build.environment]
  # Firebase client API keys are intentionally public (security is enforced
  # by Firebase Security Rules). Next.js inlines NEXT_PUBLIC_* env vars into
  # both client and server bundles, which triggers Netlify's heuristic "likely
  # secret" detection on the AIza* pattern across dozens of build output paths.
  # Disabling smart detection stops these false positives while keeping exact-
  # match secret scanning active.
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"
